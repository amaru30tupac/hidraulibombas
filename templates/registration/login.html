<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
    }

    .login-box {
      max-width: 420px;
      margin: 80px auto;
      background: white;
      border: 1px solid #d7dde7;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }

    input {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #d7dde7;
      border-radius: 8px;
      margin-top: 6px;
      margin-bottom: 14px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Iniciar sesión</h2>

    {% if form.errors %}
      <p style="color:#b91c1c;">Usuario o contraseña inválidos.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Usuario</label>
      {{ form.username }}

      <label for="id_password">Contraseña</label>
      {{ form.password }}

      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
