{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
  <link rel="shortcut icon" href="{% static 'images/favicon.png' %}">

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-xl p-8">
      <div class="mb-8 text-center">
        <img src="{% static 'images/logo.png' %}" alt="Logo Hidraulibombas" class="h-20 w-auto mx-auto mb-4 object-contain">
        <h1 class="text-3xl font-bold text-slate-900">Hidraulibombas</h1>
        <p class="text-slate-500 mt-2">Inicia sesión para continuar</p>
      </div>

      {% if form.errors %}
        <div class="mb-6 rounded-2xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm">
          Usuario o contraseña inválidos.
        </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
          <label for="id_username" class="block text-sm font-semibold text-slate-700 mb-2">Usuario</label>
          <input
            type="text"
            name="username"
            id="id_username"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          >
        </div>

        <div>
          <label for="id_password" class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
          <input
            type="password"
            name="password"
            id="id_password"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          >
        </div>

        <button
          type="submit"
          class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 transition"
        >
          Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
