{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl">
  <div class="bg-white rounded-3xl border border-slate-200 shadow-soft p-8">
    <h3 class="text-2xl font-bold text-slate-900 mb-3">Eliminar mantenimiento</h3>
    <p class="text-slate-600 mb-6">
      ¿Seguro que deseas eliminar el mantenimiento <strong>#{{ record.id }} - {{ record.title }}</strong>?
    </p>

    <form method="post" class="flex flex-wrap gap-3">
      {% csrf_token %}
      <button class="rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold px-5 py-3 transition" type="submit">
        Sí, eliminar
      </button>
      <a class="rounded-xl bg-slate-700 hover:bg-slate-800 text-white font-semibold px-5 py-3 transition" href="{% url 'maintenance_detail' record.pk %}">
        Cancelar
      </a>
    </form>
  </div>
</div>
{% endblock %}
