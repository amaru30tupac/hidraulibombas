{% extends "base.html" %}

{% block content %}
<div class="card">
  <h3>Eliminar mantenimiento</h3>
  <p>¿Seguro que deseas eliminar el mantenimiento <strong>#{{ record.id }} - {{ record.title }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <div class="actions-row">
      <button class="btn btn-danger" type="submit">Sí, eliminar</button>
      <a class="btn btn-secondary" href="{% url 'maintenance_detail' record.pk %}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
