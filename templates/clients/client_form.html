{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl">
  <div class="bg-white rounded-3xl border border-slate-200 shadow-soft p-6 md:p-8">
    <div class="mb-6">
      <h3 class="text-2xl font-bold text-slate-900">{{ form_title }}</h3>
      <p class="text-sm text-slate-500 mt-1">Completa la información principal del cliente.</p>
    </div>

    <form method="post" class="space-y-6">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label for="{{ form.name.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-2">Nombre</label>
          {{ form.name }}
        </div>

        <div>
          <label for="{{ form.email.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-2">Correo</label>
          {{ form.email }}
        </div>

        <div>
          <label for="{{ form.phone.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-2">Teléfono</label>
          {{ form.phone }}
        </div>

        <div>
          <label for="{{ form.contact_name.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-2">Contacto</label>
          {{ form.contact_name }}
        </div>

        <div class="md:col-span-2">
          <label for="{{ form.address.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-2">Dirección</label>
          {{ form.address }}
        </div>

        <div class="md:col-span-2">
          <label for="{{ form.notes.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-2">Notas</label>
          {{ form.notes }}
        </div>

        <div class="flex items-center gap-3">
          {{ form.is_active }}
          <label for="{{ form.is_active.id_for_label }}" class="text-sm font-semibold text-slate-700">Cliente activo</label>
        </div>
      </div>

      <div class="flex flex-wrap gap-3 pt-2">
        <button class="rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-3 transition" type="submit">
          Guardar
        </button>
        <a class="rounded-xl bg-slate-700 hover:bg-slate-800 text-white font-semibold px-5 py-3 transition" href="{% url 'client_list' %}">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
